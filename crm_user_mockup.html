<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM 트리거 — 유저 수신 화면 목업</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif;
  background: #1A1A2E;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 16px 60px;
}

/* ── 상단 타이틀 */
.page-title {
  color: #fff;
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 4px;
  text-align: center;
}
.page-sub { color: #666; font-size: 13px; margin-bottom: 28px; text-align: center; }

/* ── 시나리오 탭 */
.scenario-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  background: #111;
  padding: 5px;
  border-radius: 14px;
}
.s-tab {
  padding: 9px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  color: #666;
  transition: all 0.2s;
  white-space: nowrap;
}
.s-tab.active { background: #FEE500; color: #111; }

/* ── 타임라인 */
.timeline-wrap {
  display: flex;
  align-items: flex-start;
  gap: 0;
  margin-bottom: 20px;
  position: relative;
}
.timeline-track {
  display: flex;
  align-items: center;
  gap: 0;
  background: #111;
  border-radius: 40px;
  padding: 4px;
  overflow-x: auto;
  max-width: 560px;
}
.timeline-track::-webkit-scrollbar { display: none; }
.t-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  cursor: pointer;
}
.t-dot-wrap {
  display: flex;
  align-items: center;
  gap: 0;
}
.t-line { width: 28px; height: 2px; background: #333; flex-shrink: 0; }
.t-line.done { background: #FEE500; }
.t-dot {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #222;
  border: 2px solid #444;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #666;
  flex-shrink: 0;
  transition: all 0.2s;
  white-space: nowrap;
}
.t-dot.active { background: #FEE500; border-color: #FEE500; color: #111; }
.t-dot.done { background: #333; border-color: #FEE500; color: #FEE500; }
.t-dot.click-y { background: #E8FFE8; border-color: #1CC800; color: #1CC800; }
.t-dot.click-n { background: #FFF3E0; border-color: #FF6B35; color: #FF6B35; }
.t-label {
  font-size: 10px; color: #555; margin-top: 4px;
  position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
  white-space: nowrap;
}
.t-step.active .t-label { color: #FEE500; }

/* ── 분기 선택 버튼 */
.branch-btns {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.b-btn {
  padding: 9px 20px;
  border-radius: 20px;
  border: 2px solid #333;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  color: #666;
  background: #111;
  transition: all 0.2s;
}
.b-btn.click-y.active { background: #E8FFE8; border-color: #1CC800; color: #1CC800; }
.b-btn.click-n.active { background: #FFF3E0; border-color: #FF6B35; color: #FF6B35; }
.b-btn:hover { border-color: #666; }

/* ── 메인 레이아웃 */
.main-layout {
  display: flex;
  gap: 32px;
  align-items: flex-start;
  width: 100%;
  max-width: 900px;
}

/* ── 폰 목업 */
.phone-outer {
  width: 300px;
  flex-shrink: 0;
}
.phone-shell {
  width: 300px;
  background: #1C1C1E;
  border-radius: 44px;
  padding: 12px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.08);
  position: relative;
}
.phone-notch {
  width: 100px; height: 26px;
  background: #1C1C1E;
  border-radius: 0 0 18px 18px;
  position: absolute;
  top: 12px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  display: flex; align-items: center; justify-content: center;
}
.phone-camera { width: 10px; height: 10px; border-radius: 50%; background: #333; margin-left: 4px; }
.phone-screen {
  background: #B2C4D5;
  border-radius: 34px;
  overflow: hidden;
  height: 580px;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* 상태바 */
.status-bar {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 10px 18px 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
}
.status-time { font-size: 13px; font-weight: 700; color: #111; }
.status-icons { display: flex; gap: 4px; align-items: center; }
.status-icons span { font-size: 11px; color: #111; }

/* 채팅 헤더 */
.chat-header {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}
.back-btn { font-size: 16px; color: #111; font-weight: 300; padding: 2px 6px 2px 0; }
.unread-badge {
  background: #FF3B30;
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.header-center { flex: 1; text-align: center; }
.header-name { font-size: 14px; font-weight: 700; color: #111; display: flex; align-items: center; justify-content: center; gap: 4px; }
.header-name .verify { font-size: 11px; color: #3182F6; }
.header-status { font-size: 10px; color: #888; margin-top: 1px; }
.header-icons { display: flex; gap: 10px; }
.header-icons span { font-size: 16px; color: #111; }

/* 채팅 바디 */
.chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 10px 10px 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  scroll-behavior: smooth;
}
.chat-body::-webkit-scrollbar { display: none; }

/* 날짜 구분선 */
.date-divider {
  text-align: center;
  margin: 8px 0;
}
.date-divider span {
  background: rgba(0,0,0,0.18);
  color: #fff;
  font-size: 10px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 10px;
}

/* 시스템 메시지 (채널 추가 안내) */
.system-msg {
  background: rgba(255,255,255,0.75);
  border-radius: 10px;
  padding: 10px 12px;
  margin: 4px 0;
  font-size: 10px;
  color: #555;
  line-height: 1.6;
}
.system-msg .sys-sender { font-size: 11px; font-weight: 700; color: #111; margin-bottom: 4px; }

/* 채널 메시지 버블 */
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  margin: 6px 0 2px;
}
.msg-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 800;
  align-self: flex-start;
  margin-top: 2px;
}
.msg-bubble-wrap { flex: 1; max-width: 210px; }
.msg-sender-name { font-size: 10px; color: #555; margin-bottom: 4px; font-weight: 500; }
.msg-bubble {
  background: #fff;
  border-radius: 4px 14px 14px 14px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.msg-ad-label { font-size: 9px; color: #888; padding: 8px 12px 0; }
.msg-img {
  width: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.msg-img img { width: 100%; display: block; }
.msg-text { padding: 10px 12px; font-size: 11px; line-height: 1.6; color: #222; }
.msg-text b { font-weight: 700; }
.msg-btn-area { border-top: 1px solid #F0F0F0; }
.msg-btn {
  width: 100%;
  padding: 9px 12px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: #3A3A3A;
  cursor: pointer;
  transition: background 0.15s;
  border-top: 1px solid #F0F0F0;
  background: #fff;
}
.msg-btn:first-child { border-top: none; }
.msg-btn:hover { background: #F5F5F5; }
.msg-btn.highlight { color: #3182F6; font-weight: 700; }
.msg-time { font-size: 9px; color: rgba(0,0,0,0.35); margin-left: 4px; align-self: flex-end; flex-shrink: 0; white-space: nowrap; }
.unread-count { font-size: 9px; color: #FF6B35; font-weight: 700; align-self: flex-end; margin-left: 2px; }

/* 채널 메뉴바 */
.channel-menu-bar {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  border-top: 1px solid rgba(0,0,0,0.1);
}
.channel-menu-text { font-size: 13px; font-weight: 600; color: #111; }
.channel-menu-arrow { font-size: 11px; margin-left: 4px; color: #888; }

/* 하단 입력바 */
.input-bar {
  background: rgba(255,255,255,0.95);
  padding: 8px 12px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.input-plus { font-size: 20px; color: #888; }
.input-field {
  flex: 1;
  background: #F0F0F0;
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 12px;
  color: #aaa;
}

/* ── 오른쪽 설명 패널 */
.info-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}

.step-card {
  background: #1E1E30;
  border: 1.5px solid #333;
  border-radius: 14px;
  padding: 18px 20px;
  transition: border-color 0.2s;
}
.step-card.highlight { border-color: #FEE500; }
.sc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.sc-day {
  background: #FEE500;
  color: #111;
  font-size: 11px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 20px;
  flex-shrink: 0;
}
.sc-day.orange { background: #FF6B35; color: #fff; }
.sc-day.blue { background: #3182F6; color: #fff; }
.sc-day.green { background: #1CC800; color: #fff; }
.sc-day.red { background: #FF3B30; color: #fff; }
.sc-day.gray { background: #444; color: #aaa; }
.sc-title { font-size: 14px; font-weight: 700; color: #fff; }
.sc-desc { font-size: 12px; color: #888; line-height: 1.6; }
.sc-trigger {
  font-size: 11px;
  background: rgba(254,229,0,0.1);
  border: 1px solid rgba(254,229,0,0.3);
  border-radius: 8px;
  padding: 6px 10px;
  color: #FEE500;
  margin-top: 8px;
}
.sc-trigger.orange { background: rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.3); color: #FF6B35; }
.sc-trigger.blue { background: rgba(49,130,246,0.1); border-color: rgba(49,130,246,0.3); color: #3182F6; }

.branch-indicator {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.bi { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.bi.yes { background: #E8FFE8; color: #1CC800; }
.bi.no { background: #FFF3E0; color: #FF6B35; }

/* 숨김 처리 */
.hidden { display: none !important; }

/* 새 메시지 도착 애니메이션 */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-row.new { animation: slideIn 0.3s ease; }

/* 반응형 */
@media (max-width: 700px) {
  .main-layout { flex-direction: column; align-items: center; }
  .info-panel { width: 100%; max-width: 320px; }
}

/* 아바타 색상 */
.av-kakao { background: #FEE500; }
.av-yellow { background: #F9A825; }
</style>
</head>
<body>

<div class="page-title">CRM 트리거 — 유저 수신 화면</div>
<div class="page-sub">친구 추가 후 날짜별로 유저가 실제로 받는 카카오톡 채널 메시지</div>

<!-- 시나리오 탭 -->
<div class="scenario-tabs">
  <div class="s-tab active" onclick="setScenario('welcome', this)">👋 웰컴 트리거</div>
  <div class="s-tab" onclick="setScenario('churn', this)">💔 이탈케어</div>
  <div class="s-tab" onclick="setScenario('regular', this)">📅 정기 메시지</div>
</div>

<!-- 타임라인 (웰컴) -->
<div id="timeline-welcome" class="timeline-track" style="margin-bottom:52px;">
  <div class="t-step active" id="tw0" onclick="setWelcomeStep(0)">
    <div class="t-dot-wrap">
      <div class="t-dot active" id="td0">D-day</div>
    </div>
    <div class="t-label">채널 추가</div>
  </div>
  <div class="t-step" id="tw1" onclick="setWelcomeStep(1)">
    <div class="t-dot-wrap">
      <div class="t-line" id="tl1"></div>
      <div class="t-dot" id="td1">D+3</div>
    </div>
    <div class="t-label">클릭 분기</div>
  </div>
  <div class="t-step hidden" id="tw2y" onclick="setWelcomeStep('2y')">
    <div class="t-dot-wrap">
      <div class="t-line click-y" id="tl2y"></div>
      <div class="t-dot click-y" id="td2y">클릭O</div>
    </div>
    <div class="t-label">멤버십 안내</div>
  </div>
  <div class="t-step hidden" id="tw2n" onclick="setWelcomeStep('2n')">
    <div class="t-dot-wrap">
      <div class="t-line" id="tl2n"></div>
      <div class="t-dot click-n" id="td2n">클릭X</div>
    </div>
    <div class="t-label">재유입 유도</div>
  </div>
</div>

<!-- 분기 버튼 (D+3 선택 후) -->
<div id="branch-btns" class="branch-btns hidden">
  <div class="b-btn click-y" id="btn-y" onclick="chooseBranch('y')">✓ 버튼 클릭했을 때 →</div>
  <div class="b-btn click-n" id="btn-n" onclick="chooseBranch('n')">✗ 클릭 안 했을 때 →</div>
</div>

<!-- 타임라인 (이탈케어) -->
<div id="timeline-churn" class="timeline-track hidden" style="margin-bottom:52px;">
  <div class="t-step active" onclick="setChurnStep(0)">
    <div class="t-dot-wrap">
      <div class="t-dot active">6개월</div>
    </div>
    <div class="t-label">1단계 발송</div>
  </div>
  <div class="t-step" id="tc1" onclick="setChurnStep(1)">
    <div class="t-dot-wrap">
      <div class="t-line" id="tcl1"></div>
      <div class="t-dot" id="tcd1">반응?</div>
    </div>
    <div class="t-label">반응 분기</div>
  </div>
  <div class="t-step hidden" id="tc2y" onclick="setChurnStep('2y')">
    <div class="t-dot-wrap">
      <div class="t-line click-y"></div>
      <div class="t-dot click-y">반응O</div>
    </div>
    <div class="t-label">이탈케어 종료</div>
  </div>
  <div class="t-step hidden" id="tc2n" onclick="setChurnStep('2n')">
    <div class="t-dot-wrap">
      <div class="t-line"></div>
      <div class="t-dot click-n">12개월</div>
    </div>
    <div class="t-label">2단계 발송</div>
  </div>
</div>
<div id="branch-btns-churn" class="branch-btns hidden">
  <div class="b-btn click-y" id="btnc-y" onclick="chooseChurnBranch('y')">✓ 반응했을 때 →</div>
  <div class="b-btn click-n" id="btnc-n" onclick="chooseChurnBranch('n')">✗ 무반응 → 12개월 →</div>
</div>

<!-- 타임라인 (정기) -->
<div id="timeline-regular" class="timeline-track hidden" style="margin-bottom:52px;">
  <div class="t-step active" onclick="setRegularStep(0)">
    <div class="t-dot-wrap">
      <div class="t-dot active">매월 1일</div>
    </div>
    <div class="t-label">정기 발송</div>
  </div>
  <div class="t-step" onclick="setRegularStep(1)">
    <div class="t-dot-wrap">
      <div class="t-line"></div>
      <div class="t-dot">다음달</div>
    </div>
    <div class="t-label">자동 반복</div>
  </div>
</div>

<!-- 메인 레이아웃 -->
<div class="main-layout">

  <!-- 폰 목업 -->
  <div class="phone-outer">
    <div class="phone-shell">
      <div class="phone-notch">
        <div style="width:6px;height:6px;border-radius:50%;background:#333;"></div>
        <div class="phone-camera"></div>
      </div>
      <div class="phone-screen">
        <div class="status-bar">
          <span class="status-time">4:21</span>
          <div style="width:80px;height:10px;border-radius:5px;background:rgba(0,0,0,0.1);"></div>
          <div class="status-icons">
            <span>●●●</span>
          </div>
        </div>

        <div class="chat-header">
          <div class="back-btn">‹</div>
          <div class="unread-badge" id="unread-badge">1</div>
          <div class="header-center">
            <div class="header-name">카카오 <span class="verify">✔</span></div>
            <div class="header-status" id="header-status">● 채팅봇 채팅중</div>
          </div>
          <div class="header-icons">
            <span>🔍</span>
            <span>≡</span>
          </div>
        </div>

        <!-- 채팅 바디 -->
        <div class="chat-body" id="chat-body">
          <!-- JS로 채움 -->
        </div>

        <div class="channel-menu-bar">
          <span class="channel-menu-text">채널 메뉴</span>
          <span class="channel-menu-arrow">∧</span>
        </div>

        <div class="input-bar">
          <span class="input-plus">＋</span>
          <div class="input-field">챗봇에게 메시지 입력</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 설명 패널 -->
  <div class="info-panel" id="info-panel">
    <!-- JS로 채움 -->
  </div>

</div>

<script>
/* ───────────────── 데이터 ───────────────── */

const KAKAO_AVATAR = `<div class="msg-avatar av-kakao" style="font-size:10px;font-weight:900;color:#111;">K</div>`;

// 채널 추가 시스템 메시지 (공통)
const systemMsg = (channelName, date) => `
<div class="system-msg">
  <div class="sys-sender">${channelName}</div>
  '${channelName}' 채널을 추가해 주셔서 감사합니다.<br>
  앞으로 다양한 소식과 혜택/정보를 메시지로 받으실 수 있습니다.<br><br>
  채널 추가 일시(한국시간 기준): ${date}<br>
  수신거부: 홈&gt;채널 차단
</div>`;

// 버블 생성
function bubble(ad, imgEmoji, imgBg, text, btns, time, isNew) {
  const btnHtml = btns.map(b =>
    `<div class="msg-btn highlight" onclick="handleBtnClick(this)">${b}</div>`
  ).join('');
  return `
<div class="msg-row${isNew?' new':''}">
  ${KAKAO_AVATAR}
  <div class="msg-bubble-wrap">
    <div class="msg-sender-name">카카오</div>
    <div class="msg-bubble">
      ${ad?`<div class="msg-ad-label">(광고) 카카오</div>`:''}
      <div class="msg-img" style="background:${imgBg};height:${imgEmoji?'90px':'0'};overflow:hidden;">
        ${imgEmoji?`<span style="font-size:44px;user-select:none;">${imgEmoji}</span>`:''}
      </div>
      <div class="msg-text">${text}</div>
      <div class="msg-btn-area">${btnHtml}</div>
    </div>
  </div>
  <span class="msg-time">${time}</span>
</div>`;
}

/* ─── 시나리오 콘텐츠 ─── */

const scenarios = {

  /* ══ 웰컴 트리거 ══ */
  welcome: {
    steps: {

/* ───────────────── 상태 ───────────────── */
let currentScenario = 'welcome';
let currentStep = 0;
let welcomeBranch = null;
let churnBranch = null;

/* ───────────────── 렌더 ───────────────── */
function render(scenario, step) {
  const s = scenarios[scenario].steps[step];
  document.getElementById('chat-body').innerHTML = s.chat();
  document.getElementById('info-panel').innerHTML = s.info;
  // 스크롤
  const body = document.getElementById('chat-body');
  setTimeout(() => { body.scrollTop = body.scrollHeight; }, 50);
}

/* ───────────────── 시나리오 전환 ───────────────── */
function setScenario(name, el) {
  currentScenario = name;
  welcomeBranch = null;
  churnBranch = null;

  document.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  // 타임라인 전환
  ['welcome','churn','regular'].forEach(s => {
    document.getElementById('timeline-'+s).classList.toggle('hidden', s!==name);
  });

  // 분기 버튼 숨김
  document.getElementById('branch-btns').classList.add('hidden');
  const bc = document.getElementById('branch-btns-churn');
  if (bc) bc.classList.add('hidden');

  if (name === 'welcome') {
    setWelcomeStep(0);
  } else if (name === 'churn') {
    setChurnStep(0);
  } else {
    setRegularStep(0);
  }
}

/* ── 웰컴 ── */
function setWelcomeStep(step) {
  currentStep = step;
  // 점 활성화
  ['td0','td1','td2y','td2n'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 't-dot';
    if ((id==='td0'&&step===0)||(id==='td1'&&step===1)||
        (id==='td2y'&&step==='2y')||(id==='td2n'&&step==='2n')) {
      el.classList.add('active');
    } else if ((step===1||step==='2y'||step==='2n') && id==='td0') {
      el.classList.add('done');
    }
  });

  // 라인
  const l1 = document.getElementById('tl1');
  if (l1) l1.classList.toggle('done', step==='2y'||step==='2n'||step===1);

  // D+3 이후 분기 점 표시
  if (step === 1) {
    document.getElementById('branch-btns').classList.remove('hidden');
    document.getElementById('tw2y').classList.remove('hidden');
    document.getElementById('tw2n').classList.remove('hidden');
  } else if (step === '2y' || step === '2n') {
    document.getElementById('branch-btns').classList.add('hidden');
    document.getElementById('tw2y').classList.remove('hidden');
    document.getElementById('tw2n').classList.remove('hidden');
  } else {
    document.getElementById('branch-btns').classList.add('hidden');
    document.getElementById('tw2y').classList.add('hidden');
    document.getElementById('tw2n').classList.add('hidden');
  }

  render('welcome', step);
}

function chooseBranch(b) {
  document.getElementById('btn-y').classList.toggle('active', b==='y');
  document.getElementById('btn-n').classList.toggle('active', b==='n');
  setWelcomeStep(b==='y' ? '2y' : '2n');
}

/* ── 이탈케어 ── */
function setChurnStep(step) {
  if (step === 1) {
    document.getElementById('branch-btns-churn').classList.remove('hidden');
    document.getElementById('tc2y').classList.remove('hidden');
    document.getElementById('tc2n').classList.remove('hidden');
  } else if (step === '2y' || step === '2n') {
    document.getElementById('branch-btns-churn').classList.add('hidden');
    document.getElementById('tc2y').classList.remove('hidden');
    document.getElementById('tc2n').classList.remove('hidden');
  } else {
    document.getElementById('branch-btns-churn').classList.add('hidden');
    document.getElementById('tc2y').classList.add('hidden');
    document.getElementById('tc2n').classList.add('hidden');
  }
  render('churn', step);
}
function chooseChurnBranch(b) {
  document.getElementById('btnc-y').classList.toggle('active', b==='y');
  document.getElementById('btnc-n').classList.toggle('active', b==='n');
  setChurnStep(b==='y' ? '2y' : '2n');
}

/* ── 정기 ── */
function setRegularStep(step) {
  render('regular', step);
  // 타임라인 점 활성화
  document.querySelectorAll('#timeline-regular .t-dot').forEach((d,i) => {
    d.className = 't-dot' + (i===step ? ' active' : (i<step ? ' done' : ''));
  });
  document.querySelectorAll('#timeline-regular .t-line').forEach((l,i) => {
    l.classList.toggle('done', i < step);
  });
}

function handleBtnClick(el) {
  // 시각 피드백
  el.style.background = '#E8FFE8';
  el.style.color = '#1CC800';
  el.textContent = '✓ ' + el.textContent;
  setTimeout(() => {
    if (currentScenario === 'welcome' && (currentStep === 0)) {
      setWelcomeStep(1);
    }
  }, 600);
}

/* 초기 렌더 */
setWelcomeStep(0);
</script>
</body>
</html>
